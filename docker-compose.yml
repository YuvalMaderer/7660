# Production: רשימת עוגן - Anchor List
# הרצה: docker compose up -d
# דרוש: קובץ .env עם GOOGLE_SHEETS_WEB_APP_URL

services:
  app:
    build: .
    ports:
      - "${PORT:-3001}:3001"
    env_file: .env
    environment:
      - NODE_ENV=production
      - PORT=3001
    restart: unless-stopped

